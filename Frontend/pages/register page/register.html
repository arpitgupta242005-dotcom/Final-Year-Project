<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Passenger Registration | SmartRide AI</title>

    <!-- CSS -->

    <link rel="stylesheet"
          href="../css/register.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- =====================================
            REGISTER CONTAINER
===================================== -->

<section class="register-container">

<div class="register-card">

<div class="logo">

<i class="fa-solid fa-taxi"></i>

<h2>SmartRide AI</h2>

</div>

<h1>

Create Passenger Account

</h1>

<p>

Join SmartRide AI and enjoy safe, affordable,
and shared taxi rides.

</p>

<!-- =====================================
            REGISTRATION FORM
===================================== -->

<form id="registerForm">

<div class="input-group">

<label>

Full Name

</label>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="fullName"
placeholder="Enter your full name"
required>

</div>

</div>

<div class="input-group">

<label>

Email Address

</label>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

</div>

<div class="input-group">

<label>

Mobile Number

</label>

<div class="input-box">

<i class="fa-solid fa-phone"></i>

<input
type="tel"
id="mobile"
placeholder="Enter your mobile number"
maxlength="10"
required>

</div>

</div>

<div class="input-group">

<label>

Gender

</label>

<select id="gender" required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="input-group">

<label>

Date of Birth

</label>

<input
type="date"
id="dob"
required>

</div>

<div class="input-group">

<label>

Password

</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Create Password"
required>

<i class="fa-solid fa-eye"
   id="togglePassword"></i>

</div>

</div>


<div class="input-group">

<label>

Confirm Password

</label>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<i class="fa-solid fa-eye"
   id="toggleConfirmPassword"></i>

</div>

</div>


<!-- =====================================
        TERMS & CONDITIONS
===================================== -->

<div class="terms">

<label>

<input
type="checkbox"
id="terms"
required>

I agree to the

<a href="#">Terms & Conditions</a>

</label>

</div>


<!-- =====================================
        REGISTER BUTTON
===================================== -->

<button
type="submit"
class="register-btn">

Create Account

</button>


<!-- =====================================
        LOGIN LINK
===================================== -->

<div class="login-link">

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</form>

</div>

</section>


<!-- JavaScript -->

<script src="../js/register.js"></script>

</body>

</html>
